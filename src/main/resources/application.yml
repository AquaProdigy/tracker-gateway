server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            exposedHeaders: "Authorization"
            allowCredentials: false
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/auth/**
        - id: auth-user-service
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/user/**

        - id: task-service
          uri: ${TASK_SERVICE_URL}
          predicates:
            - Path=/tasks/**

jwt:
  secret: ${JWT_SECRET}