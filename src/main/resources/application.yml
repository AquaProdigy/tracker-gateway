server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            exposedHeaders: "Authorization"
            allowCredentials: false
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: auth-internal
          uri: http://localhost:8081
          predicates:
            - Path=/internal/users/**

        - id: task-service
          uri: http://localhost:8082
          predicates:
            - Path=/tasks/**

        - id: task-internal
          uri: http://localhost:8082
          predicates:
            - Path=/internal/tasks/**

jwt:
  secret: "123456789123456789werwefdsvwdvwwfwe"